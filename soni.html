<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Соня</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@300;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #07111f;
      color: #c8dff7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    /* Stars */
    canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(1.5rem, 5vh, 3.5rem);
      padding: 2rem;
    }

    .label {
      font-size: clamp(1rem, 3.5vw, 2rem);
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.55;
    }

    .status {
      font-size: clamp(3rem, 14vw, 10rem);
      font-weight: 900;
      color: #7ec8e3;
      text-shadow: 0 0 60px rgba(126,200,227,0.45);
      letter-spacing: 0.03em;
      line-height: 1;
    }

    .divider {
      width: clamp(40px, 15vw, 120px);
      height: 2px;
      background: rgba(126,200,227,0.25);
      border-radius: 1px;
    }

    .time-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3em;
    }

    .time-value {
      font-size: clamp(3.5rem, 16vw, 11rem);
      font-weight: 700;
      letter-spacing: 0.05em;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    #current-time { color: #c8dff7; }
    #expected-time { color: rgba(200,223,247,0.65); }
  </style>
</head>
<body>
  <canvas id="sky"></canvas>

  <div class="content">
    <div class="time-block">
      <div class="label">Статус вкладання Соні</div>
      <div class="status">Вкладається</div>
    </div>

    <div class="divider"></div>

    <div class="time-block">
      <div class="label">Поточний час</div>
      <div class="time-value" id="current-time">—</div>
    </div>

    <div class="time-block">
      <div class="label">Очікуване засинання</div>
      <div class="time-value" id="expected-time">22:15</div>
    </div>
  </div>

  <script>
    // ── Stars ────────────────────────────────────────────────────────
    const canvas = document.getElementById('sky');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function initStars() {
      stars = [];
      const count = Math.floor((canvas.width * canvas.height) / 6000);
      for (let i = 0; i < count; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 1.4 + 0.3,
          alpha: Math.random(),
          speed: 0.003 + Math.random() * 0.008,
          dir: Math.random() < 0.5 ? 1 : -1
        });
      }
    }

    function drawStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const s of stars) {
        s.alpha += s.speed * s.dir;
        if (s.alpha >= 1) { s.alpha = 1; s.dir = -1; }
        if (s.alpha <= 0) { s.alpha = 0; s.dir =  1; }
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(200,223,247,${s.alpha})`;
        ctx.fill();
      }
      requestAnimationFrame(drawStars);
    }

    window.addEventListener('resize', () => { resize(); initStars(); });
    resize();
    initStars();
    drawStars();

    // ── Clock ────────────────────────────────────────────────────────
    function pad(n) { return String(n).padStart(2, '0'); }

    function tick() {
      const d = new Date();
      document.getElementById('current-time').textContent =
        pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>

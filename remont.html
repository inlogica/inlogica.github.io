<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ремонт Волкових</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      color: #fff;
    }

    /* Background photo */
    .bg {
      position: fixed;
      inset: 0;
      background-image: url('https://bild.ua/images/orig/full/00006065cd672e8235e5');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      /* fallback gradient if no photo */
      background-color: #0b1a2e;
    }

    /* Dark overlay for readability */
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(5, 15, 35, 0.55) 0%,
        rgba(5, 15, 35, 0.72) 50%,
        rgba(5, 15, 35, 0.85) 100%
      );
    }

    /* Blurred glow behind content */
    .glow {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .glow::before {
      content: '';
      width: 60vw;
      height: 60vh;
      background: radial-gradient(ellipse, rgba(80,160,255,0.12) 0%, transparent 70%);
      border-radius: 50%;
    }

    /* Card */
    .card {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(1.2rem, 4vh, 2.8rem);
      padding: clamp(2rem, 5vw, 4rem) clamp(1.5rem, 6vw, 5rem);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 2rem;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      max-width: 900px;
      width: 92vw;
    }

    /* Top label */
    .family {
      font-size: clamp(0.85rem, 2.5vw, 1.4rem);
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      opacity: 0.55;
    }

    /* Title */
    .title {
      font-size: clamp(1.6rem, 5vw, 3.2rem);
      font-weight: 700;
      opacity: 0.75;
      letter-spacing: 0.05em;
    }

    /* Status badge */
    .status-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5em;
    }

    .status-label {
      font-size: clamp(0.75rem, 2vw, 1.1rem);
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      opacity: 0.5;
    }

    .status {
      font-size: clamp(2.2rem, 9vw, 6.5rem);
      font-weight: 900;
      line-height: 1.1;
      background: linear-gradient(135deg, #60c4ff 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      letter-spacing: 0.01em;
    }

    /* Pulse dot */
    .pulse-row {
      display: flex;
      align-items: center;
      gap: 0.6em;
      opacity: 0.7;
    }

    .dot {
      width: clamp(8px, 1.5vw, 14px);
      height: clamp(8px, 1.5vw, 14px);
      border-radius: 50%;
      background: #60c4ff;
      box-shadow: 0 0 10px #60c4ff;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.4); opacity: 0.5; }
    }

    .pulse-text {
      font-size: clamp(0.75rem, 2vw, 1.1rem);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* Divider */
    .divider {
      width: clamp(40px, 20vw, 160px);
      height: 1px;
      background: rgba(255,255,255,0.15);
    }

    /* Date & time */
    .datetime {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2em;
    }

    .date-label {
      font-size: clamp(0.7rem, 1.8vw, 1rem);
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.45;
    }

    .date-value {
      font-size: clamp(1.4rem, 4vw, 2.8rem);
      font-weight: 700;
      opacity: 0.85;
      letter-spacing: 0.05em;
    }

    .time-value {
      font-size: clamp(2.8rem, 10vw, 7rem);
      font-weight: 900;
      letter-spacing: 0.06em;
      font-variant-numeric: tabular-nums;
      opacity: 0.95;
    }
  </style>
</head>
<body>

  <div class="bg"></div>
  <div class="glow"></div>

  <div class="card">
    <div class="family">Ремонт</div>
    <div class="title">Волкових</div>

    <div class="status-wrap">
      <div class="status-label">Поточний статус</div>
      <div class="status">Активна стадія<br>дизайну</div>
    </div>

    <div class="pulse-row">
      <div class="dot"></div>
      <div class="pulse-text">В процесі</div>
    </div>

    <div class="divider"></div>

    <div class="datetime">
      <div class="date-label">Сьогодні</div>
      <div class="date-value" id="date">—</div>
      <div class="time-value" id="time">—</div>
    </div>
  </div>

  <script>
    const MONTHS = [
      'січня','лютого','березня','квітня','травня','червня',
      'липня','серпня','вересня','жовтня','листопада','грудня'
    ];
    const DAYS = ['неділя','понеділок','вівторок','середа','четвер','п'ятниця','субота'];

    function pad(n) { return String(n).padStart(2, '0'); }

    function tick() {
      const d = new Date();
      document.getElementById('date').textContent =
        DAYS[d.getDay()] + ', ' + d.getDate() + ' ' + MONTHS[d.getMonth()] + ' ' + d.getFullYear();
      document.getElementById('time').textContent =
        pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>

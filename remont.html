<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ремонт Волкових</title>
  <meta name="referrer" content="no-referrer">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background:
        linear-gradient(160deg, rgba(10,20,40,0.55) 0%, rgba(10,20,40,0.7) 100%),
        url('https://m.respublika.kiev.ua/main/static/img/mobile/main/background2.jpg') center/cover no-repeat;
      background-color: #0d1b2e;
      color: #fff;
      padding: 1.5rem;
    }

    .content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(1.4rem, 4vh, 3rem);
      width: 100%;
      max-width: 700px;
    }

    /* ── Header ── */
    .family {
      font-size: clamp(0.9rem, 3vw, 1.4rem);
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }

    .title {
      font-size: clamp(2.2rem, 8vw, 5rem);
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.04em;
      line-height: 1;
    }

    /* ── Status ── */
    .status-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5em;
    }

    .status-label {
      font-size: clamp(0.75rem, 2.2vw, 1.1rem);
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }

    .status {
      font-size: clamp(2.4rem, 9vw, 6rem);
      font-weight: 900;
      line-height: 1.1;
      background: linear-gradient(135deg, #60c4ff 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Pulse ── */
    .pulse-row {
      display: flex;
      align-items: center;
      gap: 0.6em;
      color: rgba(255,255,255,0.6);
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #60c4ff;
      box-shadow: 0 0 10px #60c4ff;
      animation: pulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.5); opacity: 0.4; }
    }

    .pulse-text {
      font-size: clamp(0.8rem, 2.2vw, 1.1rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    /* ── Divider ── */
    .divider {
      width: 80px;
      height: 1px;
      background: rgba(255,255,255,0.15);
    }

    /* ── Date & Time ── */
    .datetime {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.15em;
    }

    .dt-label {
      font-size: clamp(0.75rem, 2vw, 1rem);
      font-weight: 300;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 0.2em;
    }

    #date {
      font-size: clamp(1.2rem, 4.5vw, 2.6rem);
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.03em;
    }

    #time {
      font-size: clamp(3.5rem, 14vw, 8rem);
      font-weight: 900;
      color: #fff;
      letter-spacing: 0.06em;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="content">

    <div>
      <div class="family">Ремонт</div>
      <div class="title">Волкових</div>
    </div>

    <div class="status-block">
      <div class="status-label">Поточний статус</div>
      <div class="status">Активна стадія<br>дизайну</div>
    </div>

    <div class="pulse-row">
      <div class="dot"></div>
      <div class="pulse-text">В процесі</div>
    </div>

    <div class="divider"></div>

    <div class="datetime">
      <div class="dt-label">Сьогодні</div>
      <div id="date">—</div>
      <div id="time">—</div>
    </div>

  </div>

  <script>
    const MONTHS = ['січня','лютого','березня','квітня','травня','червня',
                    'липня','серпня','вересня','жовтня','листопада','грудня'];
    const DAYS   = ['неділя','понеділок','вівторок','середа','четвер',"п'ятниця",'субота'];

    function pad(n) { return String(n).padStart(2, '0'); }

    function tick() {
      const d = new Date();
      document.getElementById('date').textContent =
        DAYS[d.getDay()] + ', ' + d.getDate() + ' ' + MONTHS[d.getMonth()] + ' ' + d.getFullYear();
      document.getElementById('time').textContent =
        pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
    }

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>

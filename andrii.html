<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Гроші Андрія 💸</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a1f0a;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
    }

    /* ── Falling bills ── */
    .bill {
      position: fixed;
      top: -120px;
      font-size: 3rem;
      animation: fall linear infinite;
      user-select: none;
      filter: drop-shadow(0 0 8px rgba(50,220,50,0.5));
      z-index: 0;
    }

    @keyframes fall {
      0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateY(115vh) rotate(360deg) scale(0.8); opacity: 0; }
    }

    /* ── Center text ── */
    .center {
      position: relative;
      z-index: 10;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4em;
      pointer-events: none;
    }

    .label {
      font-size: clamp(1rem, 4vw, 2rem);
      color: rgba(120,255,120,0.6);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 900;
    }

    .name {
      font-size: clamp(4rem, 18vw, 11rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #22ff44 0%, #aaff00 50%, #ffdd00 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 30px rgba(50,255,80,0.4));
    }

    .sub {
      font-size: clamp(1.5rem, 7vw, 4.5rem);
      font-weight: 900;
      color: #22ff44;
      letter-spacing: 0.05em;
      text-shadow: 0 0 30px rgba(50,255,80,0.6), 0 0 60px rgba(50,255,80,0.3);
    }

    /* green glow pulse on name */
    @keyframes glow {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(50,255,80,0.3)); }
      50%       { filter: drop-shadow(0 0 50px rgba(50,255,80,0.8)); }
    }
    .name { animation: glow 3s ease-in-out infinite; }

    /* ── Scanlines overlay for vibe ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.08) 3px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 5;
    }

    /* ── Counter ── */
    .counter {
      margin-top: 0.5em;
      font-size: clamp(0.9rem, 3vw, 1.6rem);
      color: rgba(120,255,120,0.5);
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

  <div class="center">
    <div class="label">навайбкоджено для</div>
    <div class="name">Андрій</div>
    <div class="sub">💸 Гроші сиплються 💸</div>
    <div class="counter" id="counter">+$0</div>
  </div>

  <script>
    const BILLS = ['💵','💶','💷','💴','💸','💰','🤑'];

    function randomBetween(a, b) { return a + Math.random() * (b - a); }

    function spawnBill() {
      const el = document.createElement('div');
      el.className = 'bill';
      el.textContent = BILLS[Math.floor(Math.random() * BILLS.length)];

      const size   = randomBetween(1.5, 4.5);
      const left   = randomBetween(-2, 98);
      const dur    = randomBetween(2.5, 6);
      const delay  = randomBetween(0, 3);
      const blur   = Math.random() < 0.3 ? 'blur(1.5px)' : 'none';

      el.style.cssText = `
        left: ${left}vw;
        font-size: ${size}rem;
        animation-duration: ${dur}s;
        animation-delay: ${delay}s;
        filter: drop-shadow(0 0 6px rgba(50,220,50,0.5)) ${blur};
      `;

      document.body.appendChild(el);

      setTimeout(() => el.remove(), (dur + delay) * 1000 + 200);
    }

    // Spawn continuously
    setInterval(spawnBill, 120);
    for (let i = 0; i < 30; i++) spawnBill(); // initial burst

    // Money counter
    let total = 0;
    const rates = [100, 500, 1000, 50, 250, 2000, 777];
    setInterval(() => {
      total += rates[Math.floor(Math.random() * rates.length)];
      document.getElementById('counter').textContent =
        '+$' + total.toLocaleString('en-US');
    }, 300);
  </script>
</body>
</html>
